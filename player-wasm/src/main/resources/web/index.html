<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreShockwave Web Player</title>
    <link rel="stylesheet" href="libreshockwave.css">
</head>
<body>

    <table class="page-table" cellspacing="0" cellpadding="0">
        <tr>
            <td class="page-cell">

                <div class="header">
                    <span class="header-title">LibreShockwave Web Player</span>
                    <span class="header-build" id="build-info"><!--BUILD_VERSION--></span>
                </div>

                <!-- Toolbar -->
                <div class="toolbar">
                    <label class="file-label">
                        <input type="file" id="file-picker" accept=".dcr,.dir,.dxr,.cct,.cst">
                        Browse...
                    </label>
                    <span class="toolbar-sep">URL:</span>
                    <input type="text" id="url-input" class="url-input" value="https://sandbox.h4bbo.net/dcr/14.1_b8/habbo.dcr">
                    <button id="load-url-btn" class="btn">Go</button>
                    <button id="params-btn" class="btn">Params...</button>
                    <label class="toolbar-checkbox"><input type="checkbox" id="debug-playback-cb" checked> Debug Log</label>
                    <span class="toolbar-sep">Trace:</span>
                    <input type="text" id="trace-input" class="url-input" style="width:160px;" placeholder="handler1, handler2">
                    <button id="trace-apply-btn" class="btn">Apply</button>
                </div>

                <!-- Stage -->
                <div class="stage-panel">
                    <div class="stage-inset">
                        <canvas id="stage" width="640" height="480"></canvas>
                    </div>
                </div>

                <!-- Transport -->
                <div class="transport">
                    <button id="play-btn" class="btn transport-btn" disabled>&#9654; Play</button>
                    <button id="pause-btn" class="btn transport-btn" disabled>&#9646;&#9646; Pause</button>
                    <button id="stop-btn" class="btn transport-btn" disabled>&#9632; Stop</button>
                    <span id="frame-info" class="frame-info"></span>
                </div>

                <!-- Status bar -->
                <div class="statusbar">
                    <span id="status">Ready</span>
                </div>

                <!-- Footer -->
                <div class="footer">
                    <span>LibreShockwave &mdash; by <a href="https://github.com/Quackster" target="_blank">Quackster</a></span>
                    <span><a href="https://github.com/Quackster/LibreShockwave" target="_blank">GitHub</a></span>
                </div>

            </td>
        </tr>
    </table>

    <!-- External Params modal -->
    <div id="params-modal" class="modal-overlay" style="display:none;">
        <div class="modal-window">
            <div class="modal-titlebar">
                <span>External Parameters</span>
                <button class="modal-close-btn" id="params-modal-close">X</button>
            </div>
            <div class="modal-body">
                <p class="modal-hint">Shockwave PARAM tags (sw1-sw9)</p>
                <table id="params-table" class="params-table" cellspacing="0" cellpadding="0">
                    <thead><tr><th style="width:70px;">Key</th><th>Value</th><th style="width:24px;"></th></tr></thead>
                    <tbody id="params-body"></tbody>
                </table>
                <div class="modal-buttons" style="margin-top:6px;">
                    <span style="font-size:11px;color:#333;">Preset:</span>
                    <select id="preset-select" style="font-size:11px;font-family:Verdana,Arial,sans-serif;padding:1px 2px;border:1px solid #999;min-width:120px;"></select>
                    <button id="preset-load-btn" class="btn">Load</button>
                    <button id="preset-save-btn" class="btn">Save...</button>
                    <button id="preset-delete-btn" class="btn">Delete</button>
                </div>
                <div class="modal-buttons">
                    <button id="params-add-btn" class="btn">Add</button>
                    <span class="spacer"></span>
                    <button id="params-apply-btn" class="btn btn-primary">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <script src="libreshockwave.js"></script>
    <script>
        // Default Habbo params
        var habboParams = {
            sw1: 'site.url=http://www.habbo.co.uk;url.prefix=http://www.habbo.co.uk',
            sw2: 'connection.info.host=localhost;connection.info.port=30001',
            sw3: 'client.reload.url=https://sandbox.h4bbo.net/',
            sw4: 'connection.mus.host=localhost;connection.mus.port=38101',
            sw5: 'external.variables.txt=https://sandbox.h4bbo.net/gamedata/external_variables.txt;external.texts.txt=https://sandbox.h4bbo.net/gamedata/external_texts.txt'
        };

        // Restore debug playback preference (default: checked)
        var debugCb = document.getElementById('debug-playback-cb');
        try {
            var saved = localStorage.getItem('ls_debugPlayback');
            if (saved !== null) debugCb.checked = (saved === '1');
        } catch(e) {}

        // Create the player with Habbo params pre-set
        var player = LibreShockwave.create("stage", {
            autoplay: true,
            remember: true,
            debugPlayback: debugCb.checked,
            params: habboParams,
            onLoad: function(info) {
                status.textContent = 'Loaded (' + info.width + 'x' + info.height + ', ' + info.frameCount + ' frames)';
                enableControls();
            },
            onError: function(msg) {
                status.textContent = 'Error: ' + msg;
            },
            onFrame: function(frame, total) {
                frameInfo.textContent = 'Frame ' + frame + ' / ' + total;
            },
            onDebugLog: function(log) {
                console.log(log);
            }
        });

        // Pre-populate trace handlers from localStorage so they restore after movie load
        try {
            var savedTrace = localStorage.getItem('ls_traceHandlers');
            if (savedTrace) {
                savedTrace.split(',').forEach(function(n) {
                    var t = n.trim();
                    if (t) player.addTraceHandler(t);
                });
            }
        } catch(e) {}

        // DOM refs
        var status = document.getElementById('status');
        var urlInput = document.getElementById('url-input');
        var frameInfo = document.getElementById('frame-info');

        // Restore saved URL
        try { var s = localStorage.getItem('ls_urlInput'); if (s) urlInput.value = s; } catch(e) {}

        function enableControls() {
            ['play-btn','pause-btn','stop-btn']
                .forEach(function(id) { document.getElementById(id).disabled = false; });
        }

        function disableControls() {
            ['play-btn','pause-btn','stop-btn']
                .forEach(function(id) { document.getElementById(id).disabled = true; });
            frameInfo.textContent = '';
        }

        // File picker
        document.getElementById('file-picker').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                status.textContent = 'Loading ' + e.target.files[0].name + '...';
                disableControls();
                player.reset().then(function() {
                    player.loadFile(e.target.files[0]);
                });
            }
        });

        // URL load — full reset (terminate worker, fresh WASM instance)
        function loadUrl() {
            var url = urlInput.value.trim();
            if (!url) return;
            status.textContent = 'Resetting...';
            disableControls();
            player.reset().then(function() {
                status.textContent = 'Fetching...';
                player.load(url);
            });
        }
        document.getElementById('load-url-btn').addEventListener('click', loadUrl);
        urlInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') loadUrl(); });
        urlInput.addEventListener('blur', function() {
            try { localStorage.setItem('ls_urlInput', urlInput.value); } catch(e) {}
        });

        // Transport
        document.getElementById('play-btn').addEventListener('click', function() { player.play(); status.textContent = 'Playing'; });
        document.getElementById('pause-btn').addEventListener('click', function() { player.pause(); status.textContent = 'Paused'; });
        document.getElementById('stop-btn').addEventListener('click', function() { player.stop(); status.textContent = 'Stopped'; });

        // === External Params Dialog ===

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function addParamRow(key, value) {
            var body = document.getElementById('params-body');
            var tr = document.createElement('tr');
            tr.innerHTML = '<td><input type="text" value="' + esc(key) + '" class="param-input param-key"></td>' +
                '<td><textarea class="param-input param-value" rows="3">' + esc(value) + '</textarea></td>' +
                '<td><button class="btn btn-sm">X</button></td>';
            tr.querySelector('button').addEventListener('click', function() { tr.remove(); });
            body.appendChild(tr);
        }

        function openParams() {
            var body = document.getElementById('params-body');
            body.innerHTML = '';
            var params = player._params || {};
            var keys = Object.keys(params);
            if (keys.length === 0) { addParamRow('sw1', ''); }
            else { keys.forEach(function(k) { addParamRow(k, params[k]); }); }
            document.getElementById('params-modal').style.display = 'flex';
            refreshPresetSelect();
        }

        document.getElementById('params-btn').addEventListener('click', openParams);
        document.getElementById('params-modal-close').addEventListener('click', function() {
            document.getElementById('params-modal').style.display = 'none';
        });
        document.getElementById('params-modal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
        document.getElementById('params-add-btn').addEventListener('click', function() { addParamRow('', ''); });

        // === Preset Management ===
        var builtinPresets = {
            'Habbo (default)': {
                sw1: 'site.url=http://www.habbo.co.uk;url.prefix=http://www.habbo.co.uk',
                sw2: 'connection.info.host=localhost;connection.info.port=30001',
                sw3: 'client.reload.url=https://sandbox.h4bbo.net/',
                sw4: 'connection.mus.host=localhost;connection.mus.port=38101',
                sw5: 'external.variables.txt=https://sandbox.h4bbo.net/gamedata/external_variables.txt;external.texts.txt=https://sandbox.h4bbo.net/gamedata/external_texts.txt'
            }
        };

        function getUserPresets() {
            try { return JSON.parse(localStorage.getItem('ls_paramPresets') || '{}'); } catch(e) { return {}; }
        }
        function saveUserPresets(presets) {
            try { localStorage.setItem('ls_paramPresets', JSON.stringify(presets)); } catch(e) {}
        }

        function refreshPresetSelect() {
            var sel = document.getElementById('preset-select');
            sel.innerHTML = '';
            var user = getUserPresets();
            var allNames = Object.keys(builtinPresets).concat(Object.keys(user));
            allNames.forEach(function(name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            // Disable delete for built-in presets
            document.getElementById('preset-delete-btn').disabled = !!builtinPresets[sel.value];
        }

        document.getElementById('preset-select').addEventListener('change', function() {
            document.getElementById('preset-delete-btn').disabled = !!builtinPresets[this.value];
        });

        document.getElementById('preset-load-btn').addEventListener('click', function() {
            var name = document.getElementById('preset-select').value;
            if (!name) return;
            var all = Object.assign({}, builtinPresets, getUserPresets());
            var preset = all[name];
            if (!preset) return;
            document.getElementById('params-body').innerHTML = '';
            Object.keys(preset).forEach(function(k) { addParamRow(k, preset[k]); });
        });

        document.getElementById('preset-save-btn').addEventListener('click', function() {
            var name = prompt('Preset name:');
            if (!name || !name.trim()) return;
            name = name.trim();
            if (builtinPresets[name]) { alert('Cannot overwrite a built-in preset.'); return; }
            var params = {};
            document.querySelectorAll('#params-body tr').forEach(function(tr) {
                var k = tr.querySelector('.param-key').value.trim();
                var v = tr.querySelector('.param-value').value;
                if (k) params[k] = v;
            });
            var user = getUserPresets();
            user[name] = params;
            saveUserPresets(user);
            refreshPresetSelect();
            document.getElementById('preset-select').value = name;
            document.getElementById('preset-delete-btn').disabled = false;
        });

        document.getElementById('preset-delete-btn').addEventListener('click', function() {
            var name = document.getElementById('preset-select').value;
            if (!name || builtinPresets[name]) return;
            if (!confirm('Delete preset "' + name + '"?')) return;
            var user = getUserPresets();
            delete user[name];
            saveUserPresets(user);
            refreshPresetSelect();
        });

        document.getElementById('params-apply-btn').addEventListener('click', function() {
            var newParams = {};
            document.querySelectorAll('#params-body tr').forEach(function(tr) {
                var k = tr.querySelector('.param-key').value.trim();
                var v = tr.querySelector('.param-value').value;
                if (k) newParams[k] = v;
            });
            player._params = newParams;
            player.setParams(newParams);
            document.getElementById('params-modal').style.display = 'none';
        });

        // Debug playback checkbox — updates live and persists
        debugCb.addEventListener('change', function() {
            player.setDebugPlayback(this.checked);
            try { localStorage.setItem('ls_debugPlayback', this.checked ? '1' : '0'); } catch(e) {}
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === ' ') { e.preventDefault(); player._engine && player._engine.playing ? player.pause() : player.play(); }
            else if (e.key === 'Escape') player.stop();
            else if (e.key === 'ArrowRight' && !e.ctrlKey) { e.preventDefault(); player.stepForward(); }
            else if (e.key === 'ArrowLeft' && !e.ctrlKey) { e.preventDefault(); player.stepBackward(); }
        });

        // Trace handlers — restore from localStorage and apply
        var traceInput = document.getElementById('trace-input');
        try { var savedTrace = localStorage.getItem('ls_traceHandlers'); if (savedTrace) traceInput.value = savedTrace; } catch(e) {}

        function applyTraceHandlers() {
            var raw = traceInput.value.trim();
            try { localStorage.setItem('ls_traceHandlers', raw); } catch(e) {}
            player.clearTraceHandlers();
            if (raw) {
                raw.split(',').forEach(function(n) {
                    var t = n.trim();
                    if (t) player.addTraceHandler(t);
                });
            }
        }
        document.getElementById('trace-apply-btn').addEventListener('click', applyTraceHandlers);
        traceInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') applyTraceHandlers(); });

        // Auto-load the URL on page open
        var autoUrl = urlInput.value.trim();
        if (autoUrl) {
            status.textContent = 'Fetching...';
            player.load(autoUrl);
        }
    </script>
</body>
</html>
