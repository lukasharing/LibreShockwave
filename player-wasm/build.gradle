plugins {
    id 'java'
    id 'org.teavm' version '0.13.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Depend on the player-core module (which depends on VM and SDK)
    implementation project(':player-core')

    // TeaVM interop for @Export/@Import (standard WASM target)
    implementation 'org.teavm:teavm-interop:0.13.0'
}

teavm {
    // Standard Wasm target (broad browser support, MVP)
    wasm {
        mainClass = 'com.libreshockwave.player.wasm.WasmPlayerApp'
        // Generate debug info for development
        debugInformation = true
    }

    all {
        // Preserve exported entry point class
        preservedClasses = [
            'com.libreshockwave.player.wasm.WasmPlayerApp',
            'com.libreshockwave.player.wasm.debug.WasmDebugController'
        ]
    }
}

// Copy web resources alongside generated output
tasks.register('copyWebResources', Copy) {
    from 'src/main/resources/web'
    into layout.buildDirectory.dir('generated/teavm/wasm')
}

tasks.matching { it.name == 'generateWasm' }.configureEach {
    finalizedBy 'copyWebResources'
}

// Integration test for the WASM sprite export pipeline (runs on JVM, not WASM)
tasks.register('runWasmSpriteExporterTest', JavaExec) {
    group = 'verification'
    description = 'Test SpriteDataExporter JSON output and bitmap decoding with habbo.dcr'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.libreshockwave.player.wasm.WasmSpriteExporterTest'
    jvmArgs '-Xmx512m'
    dependsOn compileTestJava
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Playback flow test: verifies fuse_frameProxy timeout creation and sprite creation
tasks.register('runWasmPlaybackFlowTest', JavaExec) {
    group = 'verification'
    description = 'Verify WASM-like playback flow creates timeouts and sprites'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.libreshockwave.player.wasm.WasmPlaybackFlowTest'
    jvmArgs '-Xmx2g'
    dependsOn compileTestJava
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Pixel-perfect comparison test: SoftwareRenderer vs Swing-style rendering
tasks.register('runWasmRenderComparisonTest', JavaExec) {
    group = 'verification'
    description = 'Compare SoftwareRenderer output with Swing-style rendering pixel-by-pixel'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.libreshockwave.player.wasm.WasmRenderComparisonTest'
    jvmArgs '-Xmx2g'
    dependsOn compileTestJava
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
